<div class="view-container active">
    <div class="app">
        <div class="topbar">
            <div class="panel-title">维护说明</div>
            <div class="top-actions" style="margin-left: auto;">
                <button class="btn" onclick="app.showAlert('数据已刷新', 'success')">刷新</button>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">添加说明</div>
                </div>
                <div class="panel-body">
                    <div class="form-group">
                        <label>类型</label>
                        <select class="select" style="width: 100%;" id="noteType">
                            <option value="notice">通知公告</option>
                            <option value="maintenance">维护记录</option>
                            <option value="update">更新日志</option>
                            <option value="bug">已知问题</option>
                            <option value="other">其他说明</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>标题</label>
                        <input class="input" style="width: 100%;" id="noteTitle" placeholder="请输入标题">
                    </div>
                    <div class="form-group">
                        <label>内容</label>
                        <textarea class="input" style="width: 100%; height: 120px; font-family: inherit; padding: 10px;" id="noteContent" placeholder="请输入说明内容..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>优先级</label>
                        <div style="display: flex; gap: 12px;">
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                <input type="radio" name="notePriority" value="low" checked>
                                <span>低</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                <input type="radio" name="notePriority" value="medium">
                                <span>中</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                <input type="radio" name="notePriority" value="high">
                                <span>高</span>
                            </label>
                        </div>
                    </div>
                    <button class="btn primary" style="width: 100%;" onclick="app.addNote()">添加说明</button>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">说明列表</div>
                    <div style="display: flex; gap: 8px;">
                        <select class="select" style="width: auto; padding: 4px 8px; font-size: 12px;" id="noteFilter" onchange="app.filterNotes()">
                            <option value="all">全部</option>
                            <option value="notice">通知公告</option>
                            <option value="maintenance">维护记录</option>
                            <option value="update">更新日志</option>
                            <option value="bug">已知问题</option>
                            <option value="other">其他说明</option>
                        </select>
                    </div>
                </div>
                <div class="panel-body" style="padding: 0; max-height: 500px; overflow-y: auto;" id="notesList">
                    <div style="padding: 40px 20px; text-align: center; color: var(--text-muted);">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px; opacity: 0.5;">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        <div style="font-size: 14px;">暂无说明记录</div>
                        <div style="font-size: 12px; margin-top: 4px;">添加第一条说明吧</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="panel" style="margin-top: 24px;">
            <div class="panel-header">
                <div class="panel-title">快速说明模板</div>
            </div>
            <div class="panel-body">
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="btn" onclick="app.useNoteTemplate('maintenance')">例行维护</button>
                    <button class="btn" onclick="app.useNoteTemplate('emergency')">紧急修复</button>
                    <button class="btn" onclick="app.useNoteTemplate('update')">版本更新</button>
                    <button class="btn" onclick="app.useNoteTemplate('bug')">问题记录</button>
                    <button class="btn" onclick="app.useNoteTemplate('notice')">重要通知</button>
                </div>
            </div>
        </div>
    </div>
</div>
